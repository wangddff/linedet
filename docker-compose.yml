version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    volumes:
      - ./models:/app/models
      - ./config:/app/config
      - ./datasets:/app/datasets
      - ./data/exports:/app/data/exports
      - ./linedet.db:/app/linedet.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s